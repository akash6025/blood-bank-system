<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Donors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>Blood Bank</h1>
    </div>
    <nav id="nav" class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/donors}">Donors</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/stock}">Stock</a>
    </nav>
    <div class="nav-auth">
        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Logout</button>
            </form>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/signup}">Sign up</a>
        </span>
    </div>
</header>
<main class="container py-4">
    <section>
        <h2>Search Filters</h2>
        <form method="get" th:action="@{/donors}" class="row g-2 align-items-end">
            <div class="col-sm-3">
                <label class="form-label">Blood Group</label>
                <select class="form-select" name="group">
                    <option th:selected="${selectedGroup == null}" value="">All</option>
                    <option th:each="g : ${bloodGroups}" th:value="${g}"
                            th:text="${g}" th:selected="${selectedGroup == g}"></option>
                </select>
            </div>
            <div class="col-sm-3">
                <label class="form-label">City</label>
                <input class="form-control" type="text" name="city" th:value="${selectedCity}" placeholder="e.g. Mumbai" />
            </div>
            <div class="col-sm-6">
                <button class="btn btn-danger me-2" type="submit">Apply</button>
                <a class="btn btn-outline-secondary" th:href="@{/donors}">Reset</a>
            </div>
        </form>
    </section>

    <section>
        <h2>Register New Donor</h2>
        <form th:action="@{/donors}" th:object="${donor}" method="post" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label class="form-label">Name</label>
                <input class="form-control" type="text" th:field="*{name}" required />
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div>
                <label class="form-label">Email</label>
                <input class="form-control" type="email" th:field="*{email}" required />
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div>
                <label class="form-label">Phone</label>
                <input class="form-control" type="text" th:field="*{phone}" required />
                <div class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>
            <div>
                <label class="form-label">Age</label>
                <input class="form-control" type="number" min="18" max="65" th:field="*{age}" required />
                <div class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
            </div>
            <div>
                <label class="form-label">Gender</label>
                <select class="form-select" th:field="*{gender}">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
            </div>
            <div>
                <label class="form-label">Blood Group</label>
                <select class="form-select" th:field="*{bloodGroup}">
                    <option th:each="g : ${bloodGroups}" th:value="${g}" th:text="${g}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('bloodGroup')}" th:errors="*{bloodGroup}"></div>
            </div>
            <div>
                <label class="form-label">City</label>
                <input class="form-control" type="text" th:field="*{city}" required />
                <div class="error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
            </div>
            <div>
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="2" th:field="*{address}" required></textarea>
                <div class="error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
            </div>
            <div>
                <label class="form-label">Last Donation Date</label>
                <input class="form-control" type="date" th:field="*{lastDonationDate}" />
            </div>
            <button class="btn btn-danger" type="submit">Save</button>
        </form>
    </section>

    <section>
        <h2>All Donors</h2>
        <table class="table table-striped">
            <thead class="table-light">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Blood Group</th>
                <th>City</th>
                <th>Last Donation</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="d : ${donors}">
                <td th:text="${d.name}"></td>
                <td th:text="${d.email}"></td>
                <td th:text="${d.phone}"></td>
                <td th:text="${d.age}"></td>
                <td th:text="${d.gender}"></td>
                <td th:text="${d.bloodGroup}"></td>
                <td th:text="${d.city}"></td>
                <td th:text="${d.lastDonationDate}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
