<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { background: #dc2626; color: white; text-align: center; }
        .btn-primary { background: #dc2626; border: none; }
        .btn-primary:hover { background: #b91c1c; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
        .success-message { background: #d1fae5; color: #065f46; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h3>Blood Bank Login</h3>
            </div>
            <div class="card-body">
                <!-- Success Message -->
                <div th:if="${param.success}" class="success-message">
                    <i class="fas fa-check-circle me-2"></i>
                    Password reset successful! Please login with your new password.
                </div>
                
                <!-- Error Message -->
                <div th:if="${param.error}" class="error-message">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Invalid email or password. Please try again.
                </div>
                
                <!-- Logout Message -->
                <div th:if="${param.logout}" class="success-message">
                    <i class="fas fa-check-circle me-2"></i>
                    You have been logged out successfully.
                </div>
                
                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required 
                               placeholder="Enter your email" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required 
                               placeholder="Enter your password" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>
                        Login
                    </button>
                </form>
                
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div>
                        <small>Don't have an account? <a th:href="@{/signup}">Sign up</a></small>
                    </div>
                    <div>
                        <small><a th:href="@{/forgot-password}">Forgot password?</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
