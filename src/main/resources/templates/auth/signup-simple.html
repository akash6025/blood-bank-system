<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .signup-container { max-width: 450px; margin: 100px auto; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { background: #dc2626; color: white; text-align: center; }
        .btn-primary { background: #dc2626; border: none; }
        .btn-primary:hover { background: #b91c1c; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
        .success-message { background: #d1fae5; color: #065f46; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="signup-container">
        <div class="card">
            <div class="card-header">
                <h3>Create Account</h3>
            </div>
            <div class="card-body">
                <!-- Success Message -->
                <div th:if="${success}" class="success-message">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}">Account created successfully</span>
                </div>
                
                <!-- Error Message -->
                <div th:if="${error}" class="error-message">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}">Error message</span>
                </div>
                
                <form th:action="@{/signup}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" required 
                               placeholder="Enter your email" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required 
                               placeholder="Enter your password (min 8 characters)" minlength="8" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" name="confirmPassword" required 
                               placeholder="Confirm your password" minlength="8" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-user-plus me-2"></i>
                        Sign Up
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <small>Already have an account? <a th:href="@{/login}">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
