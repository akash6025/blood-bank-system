<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .forgot-container { max-width: 450px; margin: 100px auto; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-header { background: #dc2626; color: white; text-align: center; }
        .btn-primary { background: #dc2626; border: none; }
        .btn-primary:hover { background: #b91c1c; }
        .success-message { background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="forgot-container">
        <div class="card">
            <div class="card-header">
                <h3>Reset Password</h3>
            </div>
            <div class="card-body">
                <!-- Success Message -->
                <div th:if="${success}" class="success-message">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}">Password reset instructions sent to your email</span>
                </div>
                
                <!-- Error Message -->
                <div th:if="${error}" class="error-message">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}">Email not found</span>
                </div>
                
                <!-- Form -->
                <form th:unless="${success}" th:action="@{/forgot-password}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    
                    <div class="mb-4">
                        <h5>Enter your email address</h5>
                        <p class="text-muted">We'll send you instructions to reset your password</p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" required 
                               placeholder="Enter your registered email" />
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane me-2"></i>
                        Send Reset Instructions
                    </button>
                </form>
                
                <!-- Back to Login -->
                <div class="text-center mt-3">
                    <a th:href="@{/login}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
