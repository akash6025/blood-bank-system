<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Donation Appointments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>Blood Bank</h1>
    </div>
    <nav id="nav" class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/donors}">Donors</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/stock}">Stock</a>
        <a th:href="@{/appointments}">Appointments</a>
    </nav>
    <div class="nav-auth">
        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Logout</button>
            </form>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/signup}">Sign up</a>
        </span>
    </div>
</header>
<main class="container py-4">
    <section class="mb-4">
        <h2>Book Appointment</h2>
        <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/appointments}" method="post" th:object="${appointment}" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="col-md-4">
                <label class="form-label">Donor</label>
                <select class="form-select" name="donorId" required>
                    <option th:each="d : ${donors}" th:value="${d.id}" th:text="${d.name + ' (' + d.bloodGroup + ')'}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Scheduled At</label>
                <input class="form-control" type="datetime-local" name="scheduledAt" required />
            </div>
            <div class="col-md-2">
                <label class="form-label">Units</label>
                <input class="form-control" type="number" min="1" th:field="*{units}" />
            </div>
            <div class="col-md-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" rows="2" th:field="*{notes}"></textarea>
            </div>
            <div class="col-12">
                <button class="btn btn-danger" type="submit">Schedule</button>
            </div>
        </form>
    </section>

    <section>
        <h2>All Appointments</h2>
        <table class="table table-striped">
            <thead class="table-light">
            <tr>
                <th>Donor</th>
                <th>Group</th>
                <th>Scheduled At</th>
                <th>Units</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.donor.name}"></td>
                <td th:text="${a.donor.bloodGroup}"></td>
                <td th:text="${#temporals.format(a.scheduledAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${a.units}"></td>
                <td th:text="${a.status}"></td>
                <td>
                    <form th:if="${a.status.name() == 'SCHEDULED'}" th:action="@{'/appointments/' + ${a.id} + '/complete'}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-success btn-sm" type="submit">Mark Completed</button>
                    </form>
                    <form th:if="${a.status.name() == 'SCHEDULED'}" th:action="@{'/appointments/' + ${a.id} + '/cancel'}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-outline-secondary btn-sm" type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
