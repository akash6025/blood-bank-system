<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Blood Stock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>Blood Bank</h1>
    </div>
    <nav id="nav" class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/donors}">Donors</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/stock}">Stock</a>
    </nav>
    <div class="nav-auth">
        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Logout</button>
            </form>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/signup}">Sign up</a>
        </span>
    </div>
</header>
<main class="container py-4">
    <section>
        <h2>Add Units</h2>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/stock/add}" method="post" class="row g-2 align-items-end" sec:authorize="hasRole('ADMIN')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="col-sm-3">
                <label class="form-label">Group</label>
                <select class="form-select" name="group">
                    <option th:each="g : ${groups}" th:value="${g}" th:text="${g}"></option>
                </select>
            </div>
            <div class="col-sm-3">
                <label class="form-label">Units</label>
                <input class="form-control" type="number" min="1" name="units" />
            </div>
            <div class="col-sm-6">
                <button class="btn btn-danger" type="submit">Add</button>
            </div>
        </form>
        <div class="alert alert-info mt-2" sec:authorize="!hasRole('ADMIN')">
            Only admins can modify stock levels.
        </div>
    </section>

    <section>
        <h2>Current Stock</h2>
        <table class="table table-striped">
            <thead class="table-light">
            <tr>
                <th>Blood Group</th><th>Units</th><th>Updated</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${stocks}" th:classappend="${s.unitsAvailable} &lt; 5 ? 'table-danger' : ''">
                <td th:text="${s.bloodGroup}"></td>
                <td>
                    <span th:text="${s.unitsAvailable}"></span>
                    <span class="badge bg-danger ms-2" th:if="${s.unitsAvailable} &lt; 5">Low</span>
                </td>
                <td th:text="${#temporals.format(s.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
