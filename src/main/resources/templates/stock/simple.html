<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blood Stock Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 1200px; margin: 20px auto; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { background: #dc2626; color: white; }
        .btn-primary { background: #dc2626; border: none; }
        .btn-primary:hover { background: #b91c1c; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
        .success-message { background: #d1fae5; color: #065f46; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Blood Stock Management</h1>
            <a th:href="@{/}" class="btn btn-outline">Back to Dashboard</a>
        </div>
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="success-message">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}">Success message</span>
        </div>
        
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}">Error message</span>
        </div>
        
        <!-- Add Stock Form (Admin Only) -->
        <div class="card" sec:authorize="hasRole('ADMIN')">
            <div class="card-header">
                <h5>Add Blood Units</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/stock/add}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Blood Group</label>
                            <select name="group" class="form-select" required>
                                <option value="">Select Blood Group</option>
                                <option value="A_POS">A+</option>
                                <option value="A_NEG">A-</option>
                                <option value="B_POS">B+</option>
                                <option value="B_NEG">B-</option>
                                <option value="AB_POS">AB+</option>
                                <option value="AB_NEG">AB-</option>
                                <option value="O_POS">O+</option>
                                <option value="O_NEG">O-</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Units</label>
                            <input type="number" name="units" class="form-control" min="1" max="50" required />
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">&nbsp;</label>
                            <button type="submit" class="btn btn-primary w-100">Add Stock</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Stock Table -->
        <div class="card">
            <div class="card-header">
                <h5>Current Blood Stock Levels</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Blood Group</th>
                                <th>Units Available</th>
                                <th>Last Updated</th>
                                <th sec:authorize="hasRole('ADMIN')">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="stock : ${stocks}">
                                <td th:text="${stock.bloodGroup}">A+</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${stock.unitsAvailable <= 5 ? 'bg-danger' : (stock.unitsAvailable <= 15 ? 'bg-warning' : 'bg-success')}"
                                          th:text="${stock.unitsAvailable}">10</span>
                                </td>
                                <td th:text="${#temporals.format(stock.updatedAt, 'MMM dd, yyyy HH:mm')}">Jan 15, 2024 14:30</td>
                                <td sec:authorize="hasRole('ADMIN')">
                                    <button class="btn btn-sm btn-outline">Edit</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
