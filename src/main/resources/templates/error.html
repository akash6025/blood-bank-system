<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - Blood Bank Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <style>
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            text-align: center;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .error-code {
            font-size: 4rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .error-message {
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .error-timestamp {
            font-size: 0.9rem;
            color: #95a5a6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 24px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">⚠️</div>
        <h1 class="error-title" th:text="${error}">Error Occurred</h1>
        <p class="error-message" th:text="${message}">An error has occurred.</p>
        <p class="error-timestamp" th:text="'Time: ' + ${timestamp}">Time: --</p>
        <a href="/" class="btn-home">Return to Home</a>
    </div>
</body>
</html>
