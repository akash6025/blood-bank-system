<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>Blood Bank</h1>
    </div>
    <nav id="nav" class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/donors}">Donors</a>
        <a th:href="@{/requests}">Requests</a>
        <a th:href="@{/stock}">Stock</a>
        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Admin</a>
    </nav>
    <div class="nav-auth">
        <span sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Logout</button>
            </form>
        </span>
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/signup}">Sign up</a>
        </span>
    </div>
</header>
<main class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3 text-center">
                <div class="fw-bold">Total Donors</div>
                <div class="fs-2" th:text="${donorCount}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 text-center">
                <div class="fw-bold">Total Units</div>
                <div class="fs-2" th:text="${totalUnits}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 text-center">
                <div class="fw-bold">Pending Requests</div>
                <div class="fs-2" th:text="${pendingRequests}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 text-center">
                <div class="fw-bold">Approved Requests</div>
                <div class="fs-2" th:text="${approvedRequests}">0</div>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <h5>Blood Stock Overview</h5>
        <canvas id="stockChart" height="110"></canvas>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const labels = /*[[${stocks}]]*/ [];
    const groups = /*[[${#lists.map(stocks, 'bloodGroup')}]]*/ [];
    const units = /*[[${#lists.map(stocks, 'unitsAvailable')}]]*/ [];
    const ctx = document.getElementById('stockChart');
    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: groups,
            datasets: [{
                label: 'Units Available',
                data: units,
                backgroundColor: units.map(u => u < 5 ? 'rgba(220,38,38,0.7)' : 'rgba(59,130,246,0.7)'),
                borderColor: 'rgba(0,0,0,0.1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
